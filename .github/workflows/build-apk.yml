name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Check protected server credential
        env:
          EXPO_PUBLIC_SHABI_ACCESS_KEY: ${{ secrets.SHABI_ACCESS_KEY }}
          EXPO_PUBLIC_SHABI_ADMIN_PASSWORD_HASH: ${{ secrets.SHABI_ADMIN_PASSWORD_HASH }}
        run: |
          if [ -z "$EXPO_PUBLIC_SHABI_ACCESS_KEY" ] || [ -z "$EXPO_PUBLIC_SHABI_ADMIN_PASSWORD_HASH" ]; then
            echo "::error::Repository secrets SHABI_ACCESS_KEY and SHABI_ADMIN_PASSWORD_HASH are required."
            exit 1
          fi

      - name: Build standalone release APK
        working-directory: android
        env:
          EXPO_PUBLIC_SHABI_ACCESS_KEY: ${{ secrets.SHABI_ACCESS_KEY }}
          EXPO_PUBLIC_SHABI_ADMIN_PASSWORD_HASH: ${{ secrets.SHABI_ADMIN_PASSWORD_HASH }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Prepare APK
        run: cp android/app/build/outputs/apk/release/app-release.apk Shabi-Android-v1.0.6.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Shabi-Android-v1.0.6-Standalone-APK
          path: Shabi-Android-v1.0.6.apk
          if-no-files-found: error
          retention-days: 30
