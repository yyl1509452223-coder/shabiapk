plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.videowallpaper'
version = '0.1.0'

android {
  namespace "expo.modules.videowallpaper"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "androidx.media3:media3-exoplayer:1.9.0"
  implementation "androidx.media3:media3-effect:1.9.0"
}
